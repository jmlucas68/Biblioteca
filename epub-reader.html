<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector EPUB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1220;
            --fg: #e5e7eb;
            --muted: #94a3b8;
            --accent: #2563eb;
            --panel: #0f172a;
            --border: #1f2937;
        }

        body.light-mode {
            --bg: #ffffff;
            --fg: #0b1220;
            --muted: #475569;
            --accent: #1d4ed8;
            --panel: #f8fafc;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .title {
            font-weight: 600;
            margin-right: auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button,
        select {
            background: var(--panel);
            color: var(--fg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
        }

        button:hover {
            background: var(--bg);
        }

        #viewer {
            flex: 1 1 auto;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr;
            /* Default: rendition only */
        }

        .side.left {
            display: none;
            /* Hidden by default */
            border-right: 1px solid var(--border);
            background: var(--panel);
            overflow: auto;
        }

        /* When TOC is visible */
        body.toc-visible #viewer {
            grid-template-columns: 260px 1fr;
        }

        body.toc-visible .side.left {
            display: block;
        }

        .toc {
            padding: 10px;
            font-size: 14px;
        }

        .toc a {
            color: var(--fg);
            text-decoration: none;
            display: block;
            padding: 6px 8px;
            border-radius: 6px;
        }

        .toc a:hover {
            background: var(--bg);
        }

        #rendition {
            overflow: hidden;
        }

        .footer {
            padding: 8px 12px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--muted);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .prog {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
        }

        .bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
        }

        .hidden {
            display: none;
        }

        /* Style for highlights that have a note */
        [data-note] {
            position: relative;
        }

        [data-note]::after {
            content: ' 📝';
            /* Note icon */
            font-size: 0.7em;
            vertical-align: super;
            cursor: pointer;
            /* Prevent the icon from being selected as text */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Highlight menu styles */
        #highlightMenu {
            position: absolute;
            display: none;
            background: var(--accent);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
            font-size: 0.9em;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Sidebar Tabs */
        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .sidebar-tabs button {
            flex: 1;
            border: none;
            border-radius: 0;
            background: transparent;
            padding: 10px;
            color: var(--muted);
            font-weight: 500;
            border-bottom: 2px solid transparent;
        }

        .sidebar-tabs button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: rgba(37, 99, 235, 0.1);
        }

        .sidebar-tabs button:hover {
            background: var(--bg);
        }

        /* Annotations List */
        .annotations-list {
            padding: 0;
        }

        .annotation-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .annotation-item:hover {
            background: var(--bg);
        }

        .annotation-text {
            font-size: 0.9em;
            color: var(--fg);
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-style: italic;
            opacity: 0.9;
        }

        .annotation-note {
            font-size: 0.85em;
            color: var(--muted);
            margin-top: 6px;
            padding-left: 8px;
            border-left: 2px solid var(--accent);
            white-space: pre-wrap;
        }

        .annotation-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            line-height: 1;
            opacity: 0;
            /* Hidden by default */
            transition: opacity 0.2s, color 0.2s;
            font-size: 1.1em;
        }

        .annotation-item:hover .delete-btn {
            opacity: 1;
            /* Show on hover */
        }

        .delete-btn:hover {
            color: #ef4444;
            /* Red color on hover */
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>

<body>
    <div class="topbar">
        <div class="title" id="bookTitle">Lector EPUB</div>
        <div class="controls">
            <button id="tocBtn" title="Índice">☰</button>
            <button id="prevBtn" title="Anterior">⟨</button>
            <button id="nextBtn" title="Siguiente">⟩</button>
            <button id="highlightBtn" title="Subrayar" disabled>S</button>
            <button id="noteBtn" title="Añadir Nota" disabled>N</button>
            <select id="fontSize">
                <option value="90%">A-</option>
                <option value="100%" selected>A</option>
                <option value="110%">A+</option>
                <option value="125%">A++</option>
                <option value="150%">A+++</option>
            </select>
            <a id="downloadLink" class="button" target="_blank" rel="noopener">Descargar</a>
        </div>
    </div>
    <div id="viewer">
        <div class="side left">
            <div class="sidebar-tabs">
                <button id="tabToc" class="active">Índice</button>
                <button id="tabNotes">Notas</button>
            </div>
            <div id="tocPanel" class="sidebar-panel">
                <div class="toc" id="toc"></div>
            </div>
            <div id="notesPanel" class="sidebar-panel" style="display: none;">
                <div id="annotationsList" class="annotations-list">
                    <div style="padding: 20px; text-align: center; color: var(--muted);">Cargando notas...</div>
                </div>
            </div>
        </div>
        <div id="rendition"></div>
    </div>
    <div class="footer">
        <div id="location">0%</div>
        <div class="prog">
            <div class="bar" id="progressBar"></div>
        </div>
        <div id="cfi" class="hidden"></div>
    </div>

    <div id="noteModal"
        style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
        <div
            style="background-color: var(--panel); margin: 15% auto; padding: 20px; border: 1px solid var(--border); width: 80%; max-width: 500px; border-radius: 8px;">
            <h3>Añadir Nota</h3>
            <textarea id="noteTextarea"
                style="width: 100%; height: 100px; background: var(--bg); color: var(--fg); border: 1px solid var(--border); border-radius: 4px; padding: 8px;"></textarea>
            <div style="margin-top: 10px; text-align: right;">
                <button id="cancelNoteBtn">Cancelar</button>
                <button id="saveNoteBtn" style="background: var(--accent); color: white;">Guardar Nota</button>
            </div>
        </div>
    </div>

    <div id="displayNoteModal"
        style="display: none; position: fixed; z-index: 2001; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
        <div
            style="background-color: var(--panel); margin: 15% auto; padding: 20px; border: 1px solid var(--border); width: 80%; max-width: 500px; border-radius: 8px;">
            <h3>Nota</h3>
            <div id="displayNoteContent"
                style="padding: 10px 0; color: var(--fg); white-space: pre-wrap; max-height: 300px; overflow-y: auto;">
            </div>
            <div style="margin-top: 10px; text-align: right;">
                <button id="closeDisplayNoteBtn">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        function getParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name) || '';
        }

        const bookUrl = getParam('url');
        const bookTitle = decodeURIComponent(getParam('title')) || 'Lector EPUB';
        document.getElementById('bookTitle').textContent = bookTitle;
        document.getElementById('downloadLink').href = bookUrl;

        function applyThemeFromStorage() {
            document.body.classList.add('light-mode');
        }
        applyThemeFromStorage();
        window.addEventListener('storage', (e) => { if (e.key === 'theme') applyThemeFromStorage(); });

        const tocBtn = document.getElementById('tocBtn');
        tocBtn.onclick = () => {
            document.body.classList.toggle('toc-visible');
        };

        function resolveDriveDownloadUrl(url) {
            if (!url) return '';
            const idMatch = url.match(/[?&]id=([a-zA-Z0-9_-]+)/) || url.match(/\/file\/d\/([a-zA-Z0-9_-]+)\//);
            if (idMatch && idMatch[1]) {
                return `https://perplexity-proxy-backend.vercel.app/api/drive-proxy?id=${idMatch[1]}`;
            }
            return url;
        }
        function extractDriveId(url) {
            const m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/) || url.match(/\/file\/d\/([a-zA-Z0-9_-]+)\//);
            return m && m[1] ? m[1] : null;
        }

        async function fetchAsBlobWithCors(url) {
            const driveId = extractDriveId(url);
            if (driveId) {
                const proxyUrl = `https://perplexity-proxy-backend.vercel.app/api/drive-proxy?id=${driveId}`;
                try {
                    const res = await fetch(proxyUrl, { credentials: 'omit' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.blob();
                } catch (e) {
                    console.warn('Error fetching from custom proxy, falling back to generic CORS proxies:', e);
                }
            }

            const candidates = [
                `https://cors.isomorphic-git.org/${url}`,
                `https://corsproxy.io/?${encodeURIComponent(url)}`
            ];
            let lastError = null;
            for (const candidate of candidates) {
                try {
                    const res = await fetch(candidate, { credentials: 'omit' });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.blob();
                } catch (e) {
                    lastError = e;
                };
            }
            throw lastError || new Error('No se pudo descargar el EPUB con CORS');
        }

        (async () => {
            console.log('bookUrl:', bookUrl);
            const bookId = extractDriveId(bookUrl);
            if (!bookId) {
                document.body.innerHTML = '<div style="padding:20px;">Error: No se pudo obtener el ID del libro de la URL.</div>';
                return;
            }

            if (!bookUrl) {
                document.body.innerHTML = '<div style="padding:20px;">No se proporcionó URL del EPUB.</div>';
                return;
            }

            console.log('Starting fetch at', new Date().toLocaleTimeString());
            const resolvedUrl = resolveDriveDownloadUrl(bookUrl);
            console.log('resolvedUrl:', resolvedUrl);

            let blob = await fetchAsBlobWithCors(resolvedUrl).catch(err => {
                console.error('Error fetching blob:', err);
                document.body.innerHTML = `<div style="padding:20px;">Error al descargar el fichero: ${err.message}.</div>`;
                return null;
            });

            if (!blob) {
                if (!document.body.innerHTML.includes('Error')) {
                    document.body.innerHTML = '<div style="padding:20px;">No se pudo descargar el EPUB.</div>';
                }
                return;
            }

            console.log(`Blob fetched successfully at ${new Date().toLocaleTimeString()}. Size: ${(blob.size / 1024 / 1024).toFixed(2)} MB`);

            const book = ePub(blob, { type: 'epub', allowScriptedContent: true });
            console.log('ePub book object created:', book);
            const rendition = book.renderTo('rendition', { width: '100%', height: '100%', spread: 'auto' });

            // --- Element References ---
            const highlightBtn = document.getElementById('highlightBtn');
            const noteBtn = document.getElementById('noteBtn');
            const noteModal = document.getElementById('noteModal');
            const noteTextarea = document.getElementById('noteTextarea');
            const saveNoteBtn = document.getElementById('saveNoteBtn');
            const cancelNoteBtn = document.getElementById('cancelNoteBtn');
            const displayNoteModal = document.getElementById('displayNoteModal');
            const displayNoteContent = document.getElementById('displayNoteContent');
            const closeDisplayNoteBtn = document.getElementById('closeDisplayNoteBtn');

            // Sidebar Elements
            const tabToc = document.getElementById('tabToc');
            const tabNotes = document.getElementById('tabNotes');
            const tocPanel = document.getElementById('tocPanel');
            const notesPanel = document.getElementById('notesPanel');
            const annotationsList = document.getElementById('annotationsList');

            let allAnnotations = []; // Store annotations locally

            // Tab Switching Logic
            function switchTab(tab) {
                if (tab === 'toc') {
                    tabToc.classList.add('active');
                    tabNotes.classList.remove('active');
                    tocPanel.style.display = 'block';
                    notesPanel.style.display = 'none';
                } else {
                    tabToc.classList.remove('active');
                    tabNotes.classList.add('active');
                    tocPanel.style.display = 'none';
                    notesPanel.style.display = 'block';
                }
            }

            tabToc.onclick = () => switchTab('toc');
            tabNotes.onclick = () => switchTab('notes');

            function renderAnnotationsList() {
                annotationsList.innerHTML = '';
                if (allAnnotations.length === 0) {
                    annotationsList.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--muted);">No hay notas ni subrayados.</div>';
                    return;
                }

                // Sort by CFI (position in book) if possible, otherwise by creation date
                // Simple string comparison of CFI usually works for rough ordering
                allAnnotations.sort((a, b) => a.cfi_range.localeCompare(b.cfi_range));

                allAnnotations.forEach(ann => {
                    const item = document.createElement('div');
                    item.className = 'annotation-item';

                    // Header container for text and delete button
                    const header = document.createElement('div');
                    header.className = 'annotation-header';

                    let html = '';
                    if (ann.highlighted_text) {
                        html += `<div class="annotation-text">"${ann.highlighted_text}"</div>`;
                    } else {
                        html += `<div class="annotation-text" style="font-style:italic; color:var(--muted)">(Sin texto seleccionado)</div>`;
                    }

                    // Delete button
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerHTML = '🗑️';
                    delBtn.title = 'Eliminar';
                    delBtn.onclick = (e) => {
                        e.stopPropagation(); // Prevent navigation when clicking delete
                        if (confirm('¿Eliminar esta nota?')) {
                            deleteAnnotation(ann.id, ann.cfi_range);
                        }
                    };

                    header.innerHTML = html;
                    header.appendChild(delBtn);
                    item.appendChild(header);

                    if (ann.note_content) {
                        const noteDiv = document.createElement('div');
                        noteDiv.className = 'annotation-note';
                        noteDiv.textContent = ann.note_content;
                        item.appendChild(noteDiv);
                    }

                    item.onclick = (e) => {
                        if (!e.target.closest('.delete-btn')) {
                            rendition.display(ann.cfi_range);
                        }
                    };
                    annotationsList.appendChild(item);
                });
            }

            async function deleteAnnotation(id, cfiRange) {
                if (!id) return;
                try {
                    const response = await fetch(`https://perplexity-proxy-backend.vercel.app/api/annotations?id=${id}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        // Remove from local list
                        allAnnotations = allAnnotations.filter(a => a.id !== id);
                        // Remove from rendition
                        rendition.annotations.remove(cfiRange, 'highlight');
                        // Re-render list
                        renderAnnotationsList();
                        console.log('Annotation deleted:', id);
                    } else {
                        console.error('Failed to delete annotation:', response.statusText);
                        alert('Error al eliminar la anotación.');
                    }
                } catch (error) {
                    console.error('Error deleting annotation:', error);
                    alert('Error de red al eliminar la anotación.');
                }
            }

            let currentSelectionRange = null;
            let currentSelectionText = '';

            rendition.on('rendered', (section, view) => {
                const observer = new MutationObserver((mutationsList, observer) => {
                    for (const mutation of mutationsList) {
                        if (mutation.type === 'childList') {
                            mutation.addedNodes.forEach(node => {
                                if (node.tagName === 'IFRAME') {
                                    console.log('Nested IFRAME detected, removing sandbox.');
                                    node.removeAttribute('sandbox');
                                }
                            });
                        }
                    }
                });
                observer.observe(view.document.body, { childList: true, subtree: true });

                view.document.body.addEventListener('mouseup', () => {
                    setTimeout(() => {
                        const selection = view.document.getSelection();
                        if (selection && selection.isCollapsed) {
                            if (!highlightBtn.disabled) {
                                highlightBtn.disabled = true;
                                noteBtn.disabled = true;
                                currentSelectionRange = null;
                                currentSelectionText = '';
                            }
                        }
                    }, 10);
                });
            });

            const storedKey = 'epub-pos:' + bookUrl;
            const storedFontKey = 'epub-font:' + bookUrl;

            function saveLocation(cfi) { try { localStorage.setItem(storedKey, cfi); } catch (e) { } }
            function loadLocation() { try { return localStorage.getItem(storedKey); } catch (e) { return null; } }

            function showNote(noteText) {
                if (!noteText) return;
                displayNoteContent.textContent = noteText;
                displayNoteModal.style.display = 'block';
            }

            async function init() {
                const startCfi = loadLocation();
                await rendition.display(startCfi || undefined);

                try {
                    const toc = await book.loaded.navigation;
                    const tocEl = document.getElementById('toc');
                    tocEl.innerHTML = '';
                    (toc.toc || []).forEach((item) => {
                        const link = document.createElement('a');
                        link.textContent = item.label;
                        link.href = '#';
                        link.onclick = (e) => {
                            e.preventDefault();
                            rendition.display(item.href);
                        };
                        tocEl.appendChild(link);
                    });
                } catch (err) {
                    console.error('Error loading navigation:', err);
                }

                try {
                    const response = await fetch(`https://perplexity-proxy-backend.vercel.app/api/annotations?book_id=${bookId}`);
                    if (response.ok) {
                        const highlights = await response.json();
                        allAnnotations = highlights; // Store in global variable
                        renderAnnotationsList(); // Render the list

                        highlights.forEach(h => {
                            console.log("Rendering highlight from DB:", h);
                            const data = { highlightId: h.id };
                            if (h.note_content) {
                                data.note = h.note_content;
                            }
                            rendition.annotations.highlight(
                                h.cfi_range,
                                data,
                                (e) => { showNote(e.target.dataset.note); },
                                h.color // Use color from DB as class name
                            );
                        });
                        console.log(`Loaded ${highlights.length} highlights.`);
                    } else {
                        console.error('Failed to load highlights:', response.statusText);
                    }
                } catch (error) {
                    console.error('Error fetching existing highlights:', error);
                }
            }

            rendition.on('relocated', (location) => {
                if (book.locations) {
                    const percentage = book.locations.percentageFromCfi(location.start.cfi);
                    const percent = Math.round(percentage * 100);
                    document.getElementById('location').textContent = percent + '%';
                    document.getElementById('progressBar').style.width = percent + '%';
                }
                const cfi = location?.start?.cfi;
                if (cfi) { saveLocation(cfi); document.getElementById('cfi').textContent = cfi; }
            });

            const progBar = document.querySelector('.prog');
            if (progBar) {
                progBar.addEventListener('click', (event) => {
                    if (!book.locations) return;
                    const rect = progBar.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    const width = rect.width;
                    const percent = x / width;
                    const cfi = book.locations.cfiFromPercentage(percent);
                    rendition.display(cfi);
                });
            }

            rendition.themes.default({ 'body': { 'color': 'var(--fg)', 'background': 'transparent' } });
            // Define styles for highlight colors
            rendition.themes.override('annotations', {
                '.yellow': {
                    'background-color': 'yellow',
                },
                '.green': {
                    'background-color': 'lightgreen',
                },
                '.note-icon': {
                    'background-color': 'transparent',
                }
            });

            const savedFont = (() => { try { return localStorage.getItem(storedFontKey); } catch (e) { return null; } })();
            if (savedFont) {
                rendition.themes.fontSize(savedFont);
                const idx = Array.from(document.getElementById('fontSize').options).findIndex(o => o.value === savedFont);
                if (idx >= 0) document.getElementById('fontSize').selectedIndex = idx;
            }

            document.getElementById('prevBtn').onclick = () => rendition.prev();
            document.getElementById('nextBtn').onclick = () => rendition.next();
            document.getElementById('fontSize').onchange = (e) => {
                const val = e.target.value;
                rendition.themes.fontSize(val);
                try { localStorage.setItem(storedFontKey, val); } catch (err) { }
            };

            document.addEventListener('keydown', (e) => {
                if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
                if (e.key === 'ArrowLeft') { e.preventDefault(); rendition.prev(); }
                else if (e.key === 'ArrowRight') { e.preventDefault(); rendition.next(); }
            });

            window.addEventListener('beforeunload', () => { try { saveLocation(rendition?.currentLocation()?.start?.cfi); } catch (e) { } });

            // --- Highlight & Note Functionality ---

            rendition.on('selected', (cfiRange, contents) => {
                currentSelectionRange = cfiRange;
                currentSelectionText = rendition.getRange(cfiRange).toString();
                if (currentSelectionText.trim()) {
                    highlightBtn.disabled = false;
                    noteBtn.disabled = false;
                }
            });

            rendition.on('selectionCleared', () => {
                highlightBtn.disabled = true;
                noteBtn.disabled = true;
                currentSelectionRange = null;
                currentSelectionText = '';
            });

            async function addAnnotation(noteContent = null) {
                if (!currentSelectionRange || !bookId) return;

                const cfiRangeToSave = currentSelectionRange;
                const textToSave = currentSelectionText;

                const data = {};
                // --- START TEMPORARY CHANGE ---
                data.note = noteContent || 'test note'; // Always add a note
                let colorClass = 'note-icon'; // Always use note-icon
                // --- END TEMPORARY CHANGE ---

                // Add highlight with dynamic CLASS NAME for color
                rendition.annotations.highlight(
                    cfiRangeToSave,
                    data,
                    (e) => { showNote(e.target.dataset.note); },
                    colorClass
                );

                rendition.getContents().forEach(content => content.window.getSelection().removeAllRanges());

                try {
                    const response = await fetch('https://perplexity-proxy-backend.vercel.app/api/annotations', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            book_id: bookId,
                            cfi_range: cfiRangeToSave,
                            highlighted_text: textToSave,
                            color: colorClass, // Save the correct color to the DB
                            note_content: noteContent,
                        }),
                    });

                    if (response.ok) {
                        const savedAnn = await response.json();
                        console.log('Annotation saved:', savedAnn);

                        // Add to local list and re-render
                        // Construct object if backend response is different or just use what we sent + id
                        const newAnnotation = {
                            id: savedAnn.id || Date.now(), // Fallback if ID not returned
                            cfi_range: cfiRangeToSave,
                            highlighted_text: textToSave,
                            note_content: noteContent,
                            color: colorClass
                        };
                        allAnnotations.push(newAnnotation);
                        renderAnnotationsList();
                    } else {
                        console.error('Failed to save annotation:', response.statusText);
                        alert('Error al guardar la anotación.');
                    }
                } catch (error) {
                    console.error('Error saving annotation:', error);
                    alert('Error de red al guardar la anotación.');
                }
            }

            highlightBtn.onclick = () => addAnnotation(null);

            noteBtn.onclick = () => {
                noteTextarea.value = '';
                noteModal.style.display = 'block';
                noteTextarea.focus();
            };

            cancelNoteBtn.onclick = () => {
                noteModal.style.display = 'none';
            };

            saveNoteBtn.onclick = () => {
                const note = noteTextarea.value.trim();
                if (note) {
                    addAnnotation(note);
                    noteModal.style.display = 'none';
                }
            };

            closeDisplayNoteBtn.onclick = () => {
                displayNoteModal.style.display = 'none';
            };

            // --- Book Loading ---
            console.log('Waiting for book to open...');
            const bookOpenPromise = book.opened;
            const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('El libro tardó más de 30 segundos en abrirse')), 30000));

            try {
                await Promise.race([bookOpenPromise, timeoutPromise]);
                console.log('Book opened. Generating locations...');
                init(); // Call init first to render content
                try {
                    await book.locations.generate(1650);
                    console.log('Locations generated:', book.locations);
                } catch (e) {
                    console.error('Error generating locations:', e);
                }
            } catch (error) {
                console.error('Error opening EPUB book (or timeout):', error);
                document.body.innerHTML = `<div style="padding:20px;">Error al abrir el libro: ${error.message}.</div>`;
            }
        })();
    </script>
</body>

</html>
