<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de EPUB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
        }
        #viewer {
            height: calc(100% - 40px);
            width: 100%;
        }
        #navigation {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: #f0f0f0;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #ccc;
        }
        #prev, #next {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 0 10px;
        }
        #toc {
            position: absolute;
            left: 10px;
            top: 10px;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="navigation">
        <button id="prev">Anterior</button>
        <button id="next">Siguiente</button>
    </div>
    <script src="lector_epub.js"></script>
</body>
</html>
